# ===========================================================================
# Configuration for Twisted Zeta Functions Experimental Framework
# ===========================================================================

# Precision settings for mpmath computations
precision:
  defect: 50          # Decimal places for δ_φ(a,b) computation
  zeta: 30            # Decimal places for ζ_φ(s) evaluation
  zeros: 20           # Decimal places for zero detection
  chebyshev: 30       # Decimal places for ψ_φ(x)

# Grid parameters for ζ_φ(s) evaluation
grid:
  # Real part range
  re_min: -1.0
  re_max: 2.0
  re_step: 0.01

  # Imaginary part range
  im_min: 0.0
  im_max: 100.0
  im_step: 0.1

# Zero search parameters
search:
  # Series truncation
  n_max: 10000000      # Maximum terms in Dirichlet series

  # Newton-Raphson settings
  newton_max_iter: 100
  newton_tolerance: 1.0e-20

  # Search regions
  regions:
    critical_line:
      re_min: 0.4
      re_max: 0.6
      im_min: 0.0
      im_max: 50.0
      re_step: 0.02
      im_step: 0.5

    extended:
      re_min: -0.5
      re_max: 1.5
      im_min: 50.0
      im_max: 100.0
      re_step: 0.05
      im_step: 1.0

  # Argument principle settings
  argument_principle:
    n_points: 100
    verification_radius: 0.01

# Defect computation parameters
defect:
  # Test pairs range
  a_min: 2
  a_max: 10
  b_min: 2
  b_max: 10

  # Cocycle verification
  verify_cocycle: true
  cocycle_tolerance: 1.0e-45

# Chebyshev function parameters
chebyshev:
  # Evaluation points (logarithmic scale)
  x_min: 10
  x_max: 1000000
  n_points: 50

  # Remainder estimation
  sigma_0_candidates:
    - -1.0
    - -0.7
    - -0.5
    - -0.3
    - -0.1
    - 0.0

# Distribution defect parameters
distribution:
  X_default: 10000
  X_max: 1000000

# Parallel execution settings
parallel:
  n_workers: 8         # Number of parallel workers
  chunk_size: 5        # Arithmetics per chunk
  timeout_per_arithmetic: 3600  # Seconds

# Checkpointing
checkpoint:
  enabled: true
  interval: 10         # Save every N arithmetics
  directory: "./checkpoints"

# Database settings
database:
  path: "./data/arithmetics.db"
  batch_insert_size: 100

# Logging
logging:
  level: INFO
  file: "./logs/experiment.log"
  console: true

# Strata definitions for the 60 arithmetics
strata:
  # Strata A: Hierarchy (15 cases)
  # 3 bases × 5 levels = 15
  A:
    name: "Hierarchy"
    bases: [2.718281828, 2.0, 10.0]  # e, 2, 10
    levels: [-2, -1, 0, 1, 2]
    defect_expected: false

  # Strata B: Coherent Twist (15 cases)
  B:
    name: "CoherentTwist"
    bijections:
      - name: "log"
        defect_expected: false
      - name: "exp"
        defect_expected: false
      - name: "square"
        defect_expected: false
      - name: "sqrt"
        defect_expected: false
      - name: "cube"
        defect_expected: false
      - name: "cbrt"
        defect_expected: false
      - name: "sinh"
        defect_expected: false
      - name: "arcsinh"
        defect_expected: false
      - name: "tanh"
        defect_expected: false
      - name: "arctanh"
        defect_expected: false
      - name: "double"       # x -> 2x
        defect_expected: false
      - name: "half"         # x -> x/2
        defect_expected: false
      - name: "shift_1"      # x -> x + 1
        defect_expected: false
      - name: "power_1.5"    # x -> x^1.5
        defect_expected: false
      - name: "inverse"      # x -> 1/x
        defect_expected: false

  # Strata C: Exponential (15 cases)
  C:
    name: "Exponential"
    alphas:
      - 0.3
      - 0.5
      - 0.7
      - 1.2
      - 1.5
      - 1.7
      - 2.0
      - 2.5
      - 3.0
      - 3.5
      - 4.0
      - 4.5
      - 5.0
      - 2.718281828   # e
      - 3.141592654   # π
    defect_expected: true

  # Strata D: Arbitrary (30 cases)
  D:
    name: "Arbitrary"
    transfers:
      # Polynomials (10)
      - type: "polynomial"
        coeffs: [0, 0, 1]        # x²
        defect_expected: true
      - type: "polynomial"
        coeffs: [0, 0, 0, 1]    # x³
        defect_expected: true
      - type: "polynomial"
        coeffs: [0, 1, 1]       # x² + x
        defect_expected: true
      - type: "polynomial"
        coeffs: [1, 1, 1]       # x² + x + 1
        defect_expected: true
      - type: "polynomial"
        coeffs: [0, 2, 1]       # x² + 2x
        defect_expected: true
      - type: "polynomial"
        coeffs: [0, 0, 1, 1]    # x³ + x²
        defect_expected: true
      - type: "polynomial"
        coeffs: [0, 1, 0, 1]    # x³ + x
        defect_expected: true
      - type: "polynomial"
        coeffs: [1, 0, 1]       # x² + 1
        defect_expected: true
      - type: "polynomial"
        coeffs: [0, 0, 0, 0, 1] # x⁴
        defect_expected: true
      - type: "polynomial"
        coeffs: [0, 1, 1, 1]    # x³ + x² + x
        defect_expected: true

      # Mixed exponentials (10)
      - type: "mixed_exponential"
        alpha: 2.0
        beta: 1.0
        form: "alpha^n + beta*n"
        defect_expected: true
      - type: "mixed_exponential"
        alpha: 2.0
        beta: 3.0
        form: "alpha^n * beta^n"
        defect_expected: true
      - type: "mixed_exponential"
        alpha: 2.0
        beta: 0.5
        form: "alpha^n + beta^n"
        defect_expected: true
      - type: "mixed_exponential"
        alpha: 1.5
        beta: 2.0
        form: "alpha^n + beta*n"
        defect_expected: true
      - type: "mixed_exponential"
        alpha: 3.0
        beta: 2.0
        form: "alpha^n + beta*n"
        defect_expected: true
      - type: "mixed_exponential"
        alpha: 2.5
        beta: 1.5
        form: "alpha^n * beta^n"
        defect_expected: true
      - type: "mixed_exponential"
        alpha: 1.2
        beta: 1.3
        form: "alpha^n + beta^n"
        defect_expected: true
      - type: "mixed_exponential"
        alpha: 4.0
        beta: 0.25
        form: "alpha^n + beta*n"
        defect_expected: true
      - type: "mixed_exponential"
        alpha: 2.0
        beta: 2.0
        form: "alpha^n + beta^n"
        defect_expected: true
      - type: "mixed_exponential"
        alpha: 1.5
        beta: 1.5
        form: "alpha^n * beta^n"
        defect_expected: true

      # Rational and affine (10)
      - type: "rational"
        c: 1.0
        defect_expected: true
      - type: "rational"
        c: 2.0
        defect_expected: true
      - type: "rational"
        c: 0.5
        defect_expected: true
      - type: "affine"
        c: 2.0
        d: 0.0
        defect_expected: false
      - type: "affine"
        c: 3.0
        d: 0.0
        defect_expected: false
      - type: "affine"
        c: 0.5
        d: 0.0
        defect_expected: false
      - type: "affine"
        c: 1.0
        d: 1.0
        defect_expected: true
      - type: "affine"
        c: 2.0
        d: 1.0
        defect_expected: true
      - type: "affine"
        c: 1.0
        d: -1.0
        defect_expected: true
      - type: "identity"
        defect_expected: false

# Validation settings
validation:
  # Reproducibility test
  reproducibility:
    n_reruns: 3
    tolerance: 1.0e-15

  # Precision convergence test
  precision_convergence:
    precisions: [50, 100, 200]
    expected_convergence: true

  # Classical case validation
  classical:
    first_n_zeros: 100
    tolerance: 1.0e-12

  # Functional equation residual
  functional_equation:
    test_points: 20
    tolerance: 1.0e-8

# Output settings
output:
  # Figures
  figure_format: "pdf"
  figure_dpi: 300
  figure_directory: "./figures"

  # Data exports
  export_csv: true
  export_parquet: true
  export_directory: "./exports"

  # Compression
  compress_raw_data: true
